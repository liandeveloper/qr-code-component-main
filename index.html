<!DOCTYPE html>
<html lang="en">
  <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Outfit Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Frontend Mentor | QR code component</title>
    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution { width: 90%; margin-top: 1rem; font-size: 16px; text-align: center; color: hsl(218, 44%, 22%);}
      .attribution a { font-weight: 700; color: hsl(218, 44%, 22%);}
    </style>

  </head>
  <body>

    <!-- *Main -->
    <main class="main">
      <!-- *QR Image -->
      <section class="img">
        <!-- Image -->
        <img src="images/image-qr-code.png" alt="">
      </section>

      <!-- *Information -->
      <section class="info">
        <!-- Title -->
        <h2>Improve your front-end skills by building projects</h2>
        <!-- Description -->
        <h3>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</h3>
      </section>
    </main>

    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" rel="noopener" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="https://x.com/lian_dev" rel="noopener" target="_blank">Lian</a>.
    </div>

  </body>
</html>
